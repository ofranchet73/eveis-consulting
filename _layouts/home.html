<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}Eveïs Consulting — Odile Franchet</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}Former. Sensibiliser. Sécuriser. — Odile Franchet, Eveïs Consulting. Accompagnement formation et sensibilisation cybersécurité.{% endif %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="site-title" href="{{ '/' | relative_url }}" style="display:flex; align-items:center; gap:10px; text-decoration:none;">
        <img src="{{ '/images/logo_eveis.png' | relative_url }}" alt="Eveïs Consulting" style="height:38px; width:auto; display:block;">
        <span style="font-family:'DM Serif Display',serif; font-size:1.15em; font-weight:400; color:var(--blue); line-height:1.2;">Eveïs Consulting</span>
      </a>
    </div>
    <div class="header-nav">
      <nav class="site-nav">
        <input type="checkbox" id="nav-toggle" class="nav-toggle">
        <label for="nav-toggle" class="nav-burger">
          <span></span><span></span><span></span>
        </label>
        <div class="nav-links">
          <a href="{{ '/' | relative_url }}" class="nav-link">Accueil</a>
          <a href="{{ '/formation.html' | relative_url }}" class="nav-link">Formation</a>
          <a href="{{ '/cyber.html' | relative_url }}" class="nav-link">Cybersécurité</a>
          <a href="{{ '/projets.html' | relative_url }}" class="nav-link">Projets</a>
          <a href="{{ '/apropos.html' | relative_url }}" class="nav-link">À propos</a>
        </div>
      </nav>
    </div>
  </header>

  <main class="page-content">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <p class="footer-name">Eveïs Consulting — Odile Franchet</p>
      <p class="footer-desc">Former. Sensibiliser. Sécuriser.</p>
      <p class="footer-desc" style="margin-top:6px;">
        <a href="{{ '/blog.html' | relative_url }}" style="color:#7a9ac8; text-decoration:none; font-size:0.85em;">Blog</a>
        <span style="color:#4a6a98; margin:0 8px;">·</span>
        <a href="https://www.linkedin.com/in/odile-franchet" target="_blank" style="color:#7a9ac8; text-decoration:none; font-size:0.85em;">LinkedIn</a>
        <span style="color:#4a6a98; margin:0 8px;">·</span>
        <a href="mailto:ofranchet@gmail.com" style="color:#7a9ac8; text-decoration:none; font-size:0.85em;">Contact</a>
      </p>
      <p class="footer-copy">© {{ 'now' | date: "%Y" }} Eveïs Consulting</p>
    </div>
  </footer>

  <!-- Inclusion du CSS global (le style que vous aviez en bas) -->
  <style>
    :root {
      --blue: #1a3a8f;
      --blue-light: #eef3fc;
      --blue-dark: #0f2b5c;
      --accent: #d4553a;
      --white: #ffffff;
      --bg: #f8fafd;
      --text: #1f2937;
      --muted: #4b5563;
      --border: #e2e8f0;
      --radius: 12px;
      --max-width: 1200px;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--white);
      color: var(--text);
      line-height: 1.6;
    }
    .site-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--white);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      max-width: var(--max-width);
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .site-nav {
      position: relative;
    }
    .nav-links {
      display: flex;
      gap: 28px;
      align-items: center;
    }
    .nav-link {
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--blue);
      transition: color 0.2s;
    }
    .nav-link:hover {
      color: var(--accent);
    }
    .nav-toggle, .nav-burger {
      display: none;
    }
    @media (max-width: 680px) {
      .nav-burger {
        display: flex;
        flex-direction: column;
        gap: 5px;
        cursor: pointer;
      }
      .nav-burger span {
        width: 25px;
        height: 2px;
        background: var(--blue);
        transition: 0.3s;
      }
      .nav-links {
        position: fixed;
        top: 70px;
        left: -100%;
        width: 100%;
        flex-direction: column;
        background: var(--white);
        padding: 30px;
        gap: 20px;
        transition: 0.3s;
        box-shadow: 0 10px 20px rgba(0,0,0,0.1);
      }
      .nav-toggle:checked ~ .nav-links {
        left: 0;
      }
    }
    .page-content {
      min-height: 70vh;
    }
    .site-footer {
      background: var(--blue-dark);
      color: rgba(255,255,255,0.7);
      padding: 40px 24px;
      text-align: center;
      font-size: 0.85rem;
    }
    .footer-name {
      font-family: 'DM Serif Display', serif;
      font-size: 1.1rem;
      color: white;
      margin-bottom: 8px;
    }
    /* Styles des portes (héro, portes, pourquoi, productions, cta) */
    .hero {
      background: linear-gradient(135deg, var(--blue) 0%, var(--blue-dark) 100%);
      color: white;
      padding: 60px 24px;
      text-align: center;
    }
    .hero-inner {
      max-width: var(--max-width);
      margin: 0 auto;
    }
    .hero-eyebrow {
      font-size: 0.85rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0.8;
      margin-bottom: 16px;
    }
    .hero h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 2.8rem;
      font-weight: 400;
      margin-bottom: 16px;
    }
    .hero-sub {
      font-size: 1.2rem;
      opacity: 0.9;
    }
    .home-portes-wrap {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 40px 0;
    }
    .home-portes-inner {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0 24px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .home-porte {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 28px 24px;
      border-radius: var(--radius);
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
      border: 1px solid var(--border);
    }
    .home-porte:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(26,58,143,0.12);
    }
    .home-porte--formation {
      background: var(--blue-light);
      border-left: 4px solid var(--blue);
    }
    .home-porte--cyber {
      background: var(--blue-dark);
      border-left: 4px solid var(--accent);
    }
    .home-porte-tag {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .home-porte--formation .home-porte-tag { color: var(--accent); }
    .home-porte--cyber .home-porte-tag { color: rgba(255,255,255,0.5); }
    .home-porte-titre {
      font-family: 'DM Serif Display', serif;
      font-size: 1.25rem;
      font-weight: 400;
      line-height: 1.3;
    }
    .home-porte--formation .home-porte-titre { color: var(--blue); }
    .home-porte--cyber .home-porte-titre { color: var(--white); }
    .home-porte-desc {
      font-size: 0.88rem;
      line-height: 1.65;
    }
    .home-porte--formation .home-porte-desc { color: var(--muted); }
    .home-porte--cyber .home-porte-desc { color: rgba(255,255,255,0.7); }
    .home-porte-lien {
      font-size: 0.85rem;
      font-weight: 600;
      margin-top: 4px;
    }
    .home-porte--formation .home-porte-lien { color: var(--accent); }
    .home-porte--cyber .home-porte-lien { color: rgba(255,255,255,0.85); }
    .home-pourquoi-wrap {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 48px 0;
    }
    .home-pourquoi-inner {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0 24px;
    }
    .home-pourquoi-tag {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .home-pourquoi-titre {
      font-family: 'DM Serif Display', serif;
      font-size: 1.6rem;
      color: var(--blue);
      margin-bottom: 20px;
      border-bottom: none;
    }
    .home-pourquoi-inner p {
      line-height: 1.8;
      margin-bottom: 1em;
    }
    .home-productions {
      padding: 48px 0;
      border-bottom: 1px solid var(--border);
    }
    .home-productions-inner {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0 24px;
    }
    .home-productions-label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--accent);
      margin-bottom: 20px;
    }
    .home-productions-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 20px;
    }
    .home-prod-item {
      display: flex;
      gap: 16px;
      align-items: baseline;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
      transition: padding-left 0.2s;
    }
    .home-prod-item:hover {
      padding-left: 8px;
    }
    .home-prod-tag {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--accent);
      min-width: 100px;
    }
    .home-prod-title {
      font-size: 0.95rem;
      color: var(--blue);
    }
    .home-productions-link {
      display: inline-block;
      margin-top: 16px;
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }
    .home-cibles {
      padding: 48px 0 64px;
    }
    .home-cibles-inner {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0 24px;
      text-align: center;
    }
    .home-cible--cta p {
      font-size: 1.2rem;
      margin-bottom: 16px;
    }
    .btn-email {
      display: inline-block;
      background: var(--blue);
      color: white;
      padding: 12px 28px;
      border-radius: 40px;
      text-decoration: none;
      font-weight: 500;
      transition: background 0.2s;
    }
    .btn-email:hover {
      background: var(--accent);
    }
    @media (max-width: 680px) {
      .home-portes-inner { grid-template-columns: 1fr; }
      .hero h1 { font-size: 2rem; }
    }
  </style>
</body>
</html>
