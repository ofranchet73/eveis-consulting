<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <!-- Logo + titre centrés -->
     <div style="display: flex; justify-content: center; align-items: center; gap: 14px; margin-bottom: 8px;">
  <img src="{{ '/images/logo_eveis1.png' | relative_url }}" alt="Eveïs Consulting" style="height:60px; width:auto; display:block;">
  <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
</div>
      <!-- Navigation (onglets) en dessous -->
      <div class="header-nav">
        <nav class="site-nav">
          <input type="checkbox" id="nav-toggle" class="nav-toggle">
          <label for="nav-toggle" class="nav-burger">
            <span></span><span></span><span></span>
          </label>
         <div class="nav-links">
          <a href="{{ '/' | relative_url }}" class="nav-link">Accueil</a>
          <a href="{{ '/formation.html' | relative_url }}" class="nav-link">Accompagnement OF</a>
          <a href="{{ '/cyber.html' | relative_url }}" class="nav-link">Cybersécurité</a>
          <a href="{{ '/projets.html' | relative_url }}" class="nav-link">Projets</a>
          <a href="{{ '/apropos.html' | relative_url }}" class="nav-link">À propos</a>
          <a href="{{ '/blog.html' | relative_url }}" class="nav-link">Blog</a>
        </div>
        </nav>
      </div>
    </div>
  </header>

  <main class="page-content">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <p class="footer-name">{{ site.title }}</p>
      <p class="footer-desc">Former, sensibiliser, protéger</p>
      <p class="footer-copy">© {{ 'now' | date: "%Y" }} Eveïs Consulting - Odile Franchet</p>
    </div>
  </footer>

</body>
</html>
