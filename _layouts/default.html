<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 }}">

  <!-- Balises Open Graph pour LinkedIn -->
  <meta property="og:title" content="Eveïs Consulting — Odile Franchet" />
  <meta property="og:description" content="Ingénieure formation. Je transforme les sujets complexes en dispositifs pédagogiques efficaces." />
  <meta property="og:image" content="https://ofranchet73.github.io/eveis-consulting/images/logo_eveis1.png" />
  <meta property="og:url" content="https://ofranchet73.github.io/eveis-consulting/" />
  <meta property="og:type" content="website" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <!-- Logo + titre centrés -->
     <div style="display: flex; justify-content: center; align-items: center; gap: 14px; margin-bottom: 8px;">
  <img src="{{ '/images/logo_eveis1.png' | relative_url }}" alt="Eveïs Consulting" style="height:90px; width:auto; display:block;">
  <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
</div>
      <!-- Navigation (onglets) en dessous -->
      <div class="header-nav">
        <nav class="site-nav">
          <input type="checkbox" id="nav-toggle" class="nav-toggle">
          <label for="nav-toggle" class="nav-burger">
            <span></span><span></span><span></span>
          </label>
         <div class="nav-links">
          <a href="{{ '/' | relative_url }}" class="nav-link">Accueil</a>
          <a href="{{ '/apropos.html' | relative_url }}" class="nav-link">À propos</a>
          <a href="{{ '/formation.html' | relative_url }}" class="nav-link">Accompagnement OF</a>
          <a href="{{ '/entreprises.html' | relative_url }}" class="nav-link">Sensibilisation</a>
          <a href="{{ '/dvlptoffre.html' | relative_url }}" class="nav-link">Pour les entreprises cyber</a>
          <a href="{{ '/realisations.html' | relative_url }}" class="nav-link">Réalisations</a>
        </div>
        </nav>
      </div>
    </div>
  </header>

  <main class="page-content">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <p class="footer-name">{{ site.title }}</p>
      <p class="footer-desc">Comprendre, structurer, transformer</p>
    </div>
  </footer>

</body>
</html>
